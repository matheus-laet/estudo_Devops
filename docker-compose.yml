version: "3.9"

services:
  datapulse:
    build:
      context: .
      dockerfile: Dockerfile
    image: datapulse:latest
    container_name: datapulse-dashboard
    ports:
      - "8080:80"        # acesse em http://localhost:8080
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/"]
      interval: 30s
      timeout: 5s
      retries: 3
